version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ejagriti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ejagriti_secret}
      POSTGRES_DB: ${POSTGRES_DB:-ejagriti}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ejagriti}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrations:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-ejagriti}:${POSTGRES_PASSWORD:-ejagriti_secret}@postgres:5432/${POSTGRES_DB:-ejagriti}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/app/migrations

  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Platform-standard
      DATABASE_URL: postgresql://${POSTGRES_USER:-ejagriti}:${POSTGRES_PASSWORD:-ejagriti_secret}@postgres:5432/${POSTGRES_DB:-ejagriti}
      # eJagriti custom
      EJAGRITI_BASE_URL: ${EJAGRITI_BASE_URL:-https://e-jagriti.gov.in}
      EJAGRITI_RUN_ONCE: ${EJAGRITI_RUN_ONCE:-false}
      EJAGRITI_DRY_RUN: ${EJAGRITI_DRY_RUN:-false}
      EJAGRITI_LOG_LEVEL: ${EJAGRITI_LOG_LEVEL:-INFO}
      EJAGRITI_SEARCH_KEYWORD: ${EJAGRITI_SEARCH_KEYWORD:-samsung}
      EJAGRITI_DAILY_CALL_BUDGET: ${EJAGRITI_DAILY_CALL_BUDGET:-3500}
      EJAGRITI_MAX_CONCURRENT_REQUESTS: ${EJAGRITI_MAX_CONCURRENT_REQUESTS:-2}
      EJAGRITI_MAX_RETRIES: ${EJAGRITI_MAX_RETRIES:-5}
      EJAGRITI_PDF_STORAGE_DIR: ${EJAGRITI_PDF_STORAGE_DIR:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    volumes:
      - ./migrations:/app/migrations

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Platform-standard
      DATABASE_URL: postgresql://${POSTGRES_USER:-ejagriti}:${POSTGRES_PASSWORD:-ejagriti_secret}@postgres:5432/${POSTGRES_DB:-ejagriti}
      REPLICA_DATABASE_URL: ${REPLICA_DATABASE_URL:-}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      # eJagriti custom
      EJAGRITI_LOG_LEVEL: ${EJAGRITI_LOG_LEVEL:-INFO}
      EJAGRITI_RATE_LIMIT_PER_MINUTE: ${EJAGRITI_RATE_LIMIT_PER_MINUTE:-100}
      EJAGRITI_CACHE_TTL_SECONDS: ${EJAGRITI_CACHE_TTL_SECONDS:-3600}
      EJAGRITI_SA_POOL_SIZE: ${EJAGRITI_SA_POOL_SIZE:-5}
      EJAGRITI_SA_MAX_OVERFLOW: ${EJAGRITI_SA_MAX_OVERFLOW:-10}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully

volumes:
  postgres_data:
